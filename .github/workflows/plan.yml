name: plan

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: [ "staging" ]
    paths-ignore: [ "docs/**" ]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # secrets:
  #   runs-on: ubuntu-latest
  #   if: ${{ github.event.pull_request.base.ref == 'staging' }}
  #   steps:

  #     - name: create secret files
  #       env:
  #         STAGING_TFVARS: ${{ secrets.STAGING_TFVARS }}
  #       run: |
  #         echo $STAGING_TFVARS | base64 -di > staging.tfvars

  #     - uses: actions/upload-artifact@v2
  #       with:
  #         name: staging-tfvars
  #         path: staging.tfvars          
          
  build-and-plan-staging:
    # needs: secrets
    environment: staging
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.base.ref == 'staging' }}
    steps:

      - name: checkout Code Repository
        uses: actions/checkout@v3

      - name: build the stack
        run:  docker-compose -f app/compose.yml up -d --build

      - name: tear down the stack
        run:  docker-compose -f app/compose.yml down

      - name: test secret env
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAGING_TFVARS: ${{ secrets.STAGING_TFVARS }}
        run: |
          echo $GITHUB_TOKEN
          echo $STAGING_TFVARS

      - name: install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa # optional
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          # config: ${{ secrets.CONFIG }} # ssh_config; optional
          if_key_exists: fail # replace / ignore / fail; optional (defaults to fail)        

      # - name: download tfvars
      #   uses: actions/download-artifact@v2
      #   with:
      #     name: staging-tfvars
      #     path: terraform
      - name: create secret files
        env:
          STAGING_TFVARS: ${{ secrets.STAGING_TFVARS }}
        run: |
          echo $STAGING_TFVARS | base64 -di > staging.tfvars
          
      - name: setup terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.2.2
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: initialize terraform
        id: tf-init
        continue-on-error: true
        env:
          TF_WORKSPACE: doge-test-staging
        run: |
          cd terraform
          terraform init -input=false

      - name: initialize terraform
        if: steps.tf-init.outcome == 'failure'
        run: |
          cd terraform
          terraform init -input=false

      - name: select or create workspace
        env:
          # ACHTUNG: do not use `TF_WORKSPACE` env variable name since then the "select"
          # command is ignored
          WORKSPACE: doge-test
        continue-on-error: true
        run: |
          cd terraform
          terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE

      - name: plan terraform
        id: plan
        continue-on-error: true
        run: |
          cd terraform
          terraform plan -var-file=staging.tfvars -input=false -no-color

      - name: post plan to github PR
        uses: mshick/add-pr-comment@v1
        with:
          allow-repeats: true
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          repo-token-user-login: 'github-actions[bot]'
          message: |
            ```diff
            ${{ steps.plan.outputs.stdout }}
            ```

      - name: fail if plan fails
        if: steps.plan.outcome == 'failure'
        run: exit 1
